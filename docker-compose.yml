services:
  loxhuebridge:
    # Dieses Compose-File baut den Container direkt aus diesem Fork.
    # Damit wird nicht versehentlich das Original-Image ghcr.io/bausi2k/loxhuebridge verwendet.
    build:
      context: .
      dockerfile: Dockerfile

    image: loxhuebridge-mehrlampensteuerung:local
    container_name: loxhuebridge
    restart: always

    # Wichtig für die Loxone UDP-Kommunikation
    network_mode: "host"

    environment:
      - TZ=Europe/Vienna

    volumes:
      # Enthält config.json, mapping.json und logs.db
      - ./data:/app/data
